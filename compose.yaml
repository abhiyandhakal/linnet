services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: linnet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: [postgres-data:/var/lib/postgresql/data]
  api:
    build: { context: ., dockerfile: Dockerfile.api }
    env_file: .env
    environment: { DATABASE_URL: postgres://postgres:postgres@postgres:5432/linnet }
    ports: ["3000:3000"]
    depends_on: [postgres]
  worker:
    build: { context: ., dockerfile: Dockerfile.worker }
    env_file: .env
    environment: { DATABASE_URL: postgres://postgres:postgres@postgres:5432/linnet }
    depends_on: [postgres]
  web:
    build: { context: ., dockerfile: Dockerfile.web }
    ports: ["5173:80"]
    depends_on: [api]
volumes:
  postgres-data:
